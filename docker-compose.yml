name: extract-pdf

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LOCAL_HTTP_TIMEOUT=${LOCAL_HTTP_TIMEOUT:-60}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./uploaded_images:/app/uploaded_images
      - ./outputs:/app/outputs
      - ./ui-config.json:/app/ui-config.json
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: .
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LOCAL_HTTP_TIMEOUT=${LOCAL_HTTP_TIMEOUT:-60}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./uploaded_images:/app/uploaded_images
      - ./outputs:/app/outputs
      - ./ui-config.json:/app/ui-config.json
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.core.celery_app.celery_app inspect ping -d
            celery@$$HOSTNAME | grep -q pong",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  redis_data:
