name: extract-pdf

services:

  # ── LightOnOCR API Server (tùy chọn) ────────────────────────────────────────
  # Dùng khi AI_PROVIDER=lightonocr hoặc local_http.
  #
  # GPU (mặc định, yêu cầu nvidia-container-toolkit):
  #   docker compose --profile lightonocr up -d
  #
  # CPU (không cần GPU):
  #   docker compose -f docker-compose.cpu.yml --profile lightonocr up -d
  #
  # Tự động theo LIGHTONOCR_DEVICE trong .env:
  #   PowerShell: .\start.ps1
  lightonocr:
    build:
      context: ./LightOnOCR-2-1B
      dockerfile: docker/Dockerfile
    image: lightonocr:latest
    container_name: lightonocr
    ports:
      - "${LIGHTONOCR_PORT:-7861}:7861"
    volumes:
      - model_data:/app/model
      - ./LightOnOCR-2-1B/outputs:/app/outputs
    environment:
      MODEL_PATH: /app/model
      LIGHTONOCR_DEVICE: ${LIGHTONOCR_DEVICE:-auto}
      LIGHTONOCR_DTYPE: ${LIGHTONOCR_DTYPE:-auto}
      API_HOST: 0.0.0.0
      API_PORT: "7861"
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTORCH_ENABLE_MPS_FALLBACK: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://127.0.0.1:7861/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    profiles:
      - lightonocr
    command: [ "python", "api.py" ]

  # ── Extract-PDF API ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: extract-pdf-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LOCAL_HTTP_TIMEOUT=${LOCAL_HTTP_TIMEOUT:-300}
      - LOCAL_HTTP_BASE_URL=${LOCAL_HTTP_BASE_URL:-http://lightonocr:7861/extract}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./uploaded_images:/app/uploaded_images
      - ./outputs:/app/outputs
      - ./ui-config.json:/app/ui-config.json
      - ./config:/app/config:ro
      - ./templates:/app/templates:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
volumes:
  model_data:
