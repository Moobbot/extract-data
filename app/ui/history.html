<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extract PDF - History</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #07111c;
      --panel: rgba(255, 255, 255, 0.96);
      --text: #142033;
      --muted: #5f6f86;
      --accent: #0f766e;
      --border: rgba(20, 32, 51, 0.12);
      --danger: #b42318;
      --ok: #067647;
      --shadow: 0 24px 80px rgba(8, 19, 31, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(20, 184, 166, 0.24), transparent 28%),
        linear-gradient(180deg, #07111c 0%, #0b1727 38%, #eef4fb 38%, #eef4fb 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 32px;
    }

    .hero {
      color: #f8fbff;
      padding: 18px 20px 24px;
      border-radius: 26px;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(37, 99, 235, 0.82));
      box-shadow: var(--shadow);
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 6px 0 0;
      color: rgba(248, 251, 255, 0.78);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.12);
      color: #f7fbff;
      border: 1px solid rgba(255, 255, 255, 0.14);
      text-decoration: none;
      border-radius: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-top: 18px;
    }

    .panel-body {
      padding: 20px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    th {
      font-weight: 700;
      color: var(--muted);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-success {
      background: rgba(6, 118, 71, 0.1);
      color: var(--ok);
    }

    .status-failed {
      background: rgba(180, 35, 24, 0.1);
      color: var(--danger);
    }

    .status-pending {
      background: rgba(37, 99, 235, 0.1);
      color: #2563eb;
    }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      background: #e8eef6;
      cursor: pointer;
      color: var(--text);
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #d1d9e6;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .preview-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(8, 19, 31, 0.56);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 1000;
    }

    .preview-backdrop.open {
      display: flex;
    }

    .preview-modal {
      width: min(980px, 100%);
      max-height: 86vh;
      background: #ffffff;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: #f7fbff;
    }

    .preview-title {
      margin: 0;
      font-size: 16px;
    }

    .preview-content {
      padding: 14px 16px;
      overflow: auto;
      line-height: 1.6;
    }

    .preview-content pre,
    .preview-content code {
      font-family: Consolas, "Courier New", monospace;
    }

    .preview-content pre {
      background: #0b1b2d;
      color: #d8e2f0;
      border-radius: 10px;
      padding: 10px 12px;
      overflow: auto;
    }

    .preview-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 10px 0;
    }

    .preview-content th,
    .preview-content td {
      border: 1px solid rgba(20, 32, 51, 0.2);
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }

    .preview-content th {
      background: #eef4fb;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div class="brand">
          <h1>Lịch sử xử lý (History)</h1>
          <p>Danh sách các tệp đã được đưa vào hàng đợi và kết quả xử lý của Celery Worker.</p>
        </div>
        <div class="actions">
          <a class="chip" href="/ui" rel="noreferrer">Quay lại Upload</a>
          <a class="chip" href="/ui/settings" rel="noreferrer">Cấu hình</a>
        </div>
      </div>
    </section>

    <div class="panel">
      <div class="panel-body">
        <table id="historyTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Thư mục</th>
              <th>Tên file</th>
              <th>Template</th>
              <th>Trạng thái</th>
              <th>Thời gian gửi</th>
              <th>Thời gian xong</th>
              <th>Tải xuống</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            <tr>
              <td colspan="8">Đang tải dữ liệu...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="previewBackdrop" class="preview-backdrop" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
    <div class="preview-modal">
      <div class="preview-head">
        <h3 id="previewTitle" class="preview-title">Kết quả trích xuất</h3>
        <button id="closePreviewBtn" class="btn" type="button">Đóng</button>
      </div>
      <div id="previewContent" class="preview-content"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const historyBody = document.getElementById("historyBody");
    const previewBackdrop = document.getElementById("previewBackdrop");
    const previewContent = document.getElementById("previewContent");
    const previewTitle = document.getElementById("previewTitle");
    const closePreviewBtn = document.getElementById("closePreviewBtn");

    function formatDate(isoString) {
      if (!isoString) return "-";
      return new Date(isoString).toLocaleString("vi-VN");
    }

    function safeSlug(text) {
      return String(text || "output")
        .replace(/[<>:"/\\|?*]+/g, "_")
        .replace(/\s+/g, "_")
        .replace(/^\.+|\.+$/g, "") || "output";
    }

    function getFilenameFromContentDisposition(value, fallbackName) {
      if (!value) {
        return fallbackName;
      }
      const match = /filename\*=UTF-8''([^;]+)|filename="?([^";]+)"?/i.exec(value);
      const encoded = match && (match[1] || match[2]);
      if (!encoded) {
        return fallbackName;
      }
      try {
        return decodeURIComponent(encoded);
      } catch (_) {
        return encoded;
      }
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function openPreview(title, html) {
      previewTitle.textContent = title;
      previewContent.innerHTML = html;
      previewBackdrop.classList.add("open");
    }

    function closePreview() {
      previewBackdrop.classList.remove("open");
      previewContent.innerHTML = "";
    }

    function renderAsMarkdown(text) {
      const value = String(text || "").trim();
      if (!value) {
        return "<em>(empty content)</em>";
      }
      if (window.marked && typeof window.marked.parse === "function") {
        window.marked.setOptions({ gfm: true, breaks: true });
        return window.marked.parse(value);
      }
      return "<pre>" + escapeHtml(value) + "</pre>";
    }

    function renderAsJson(value) {
      return "<pre>" + escapeHtml(JSON.stringify(value, null, 2)) + "</pre>";
    }

    function extractTablePayloads(payload, defaultTitle = "") {
      const tables = [];

      function addTable(rows, headers, title) {
        if (!Array.isArray(rows) || rows.length === 0) {
          return;
        }
        const dictRows = rows.filter((row) => row && typeof row === "object" && !Array.isArray(row));
        if (dictRows.length === 0) {
          return;
        }
        tables.push({
          title: title || defaultTitle || "",
          headers: Array.isArray(headers) ? headers : null,
          rows: dictRows,
        });
      }

      function walk(node, hintTitle = "") {
        if (!node) {
          return;
        }

        if (Array.isArray(node)) {
          if (node.length > 0 && node.every((item) => item && typeof item === "object" && !Array.isArray(item))) {
            addTable(node, null, hintTitle);
            return;
          }
          for (const item of node) {
            const itemTitle = item && typeof item.filename === "string" ? item.filename : hintTitle;
            walk(item, itemTitle);
          }
          return;
        }

        if (typeof node !== "object") {
          return;
        }

        const nodeTitle = typeof node.filename === "string" ? node.filename : hintTitle;

        if (Array.isArray(node.tables)) {
          for (const table of node.tables) {
            if (table && typeof table === "object") {
              addTable(table.rows, table.headers, nodeTitle);
            }
          }
        }

        if (Array.isArray(node.rows)) {
          addTable(node.rows, node.headers, nodeTitle);
        }

        if (Array.isArray(node.result)) {
          walk(node.result, nodeTitle);
        }
      }

      walk(payload, defaultTitle);
      return tables;
    }

    function extractJsonObjectsFromText(text) {
      const source = String(text || "");
      const objects = [];
      let depth = 0;
      let startIndex = -1;
      let inString = false;
      let escaped = false;

      for (let i = 0; i < source.length; i += 1) {
        const ch = source[i];

        if (inString) {
          if (escaped) {
            escaped = false;
          } else if (ch === "\\") {
            escaped = true;
          } else if (ch === '"') {
            inString = false;
          }
          continue;
        }

        if (ch === '"') {
          inString = true;
          continue;
        }

        if (ch === "{") {
          if (depth === 0) {
            startIndex = i;
          }
          depth += 1;
          continue;
        }

        if (ch === "}") {
          if (depth > 0) {
            depth -= 1;
            if (depth === 0 && startIndex >= 0) {
              const snippet = source.slice(startIndex, i + 1).trim();
              try {
                objects.push(JSON.parse(snippet));
              } catch (_) {
                // Skip invalid object fragments.
              }
              startIndex = -1;
            }
          }
        }
      }

      return objects;
    }

    function extractImageTitles(text) {
      const source = String(text || "");
      const titles = [];
      const pattern = /^\s*([^\n]+\.(?:jpg|jpeg|png|webp|bmp|pdf))\s*$/gim;
      let match;
      while ((match = pattern.exec(source)) !== null) {
        titles.push(match[1].trim());
      }
      return titles;
    }

    function extractTablesFromMixedText(text) {
      const parsedObjects = extractJsonObjectsFromText(text);
      if (parsedObjects.length === 0) {
        return [];
      }

      const titles = extractImageTitles(text);
      const tables = [];

      parsedObjects.forEach((obj, index) => {
        const title = titles[index] || "";
        const extracted = extractTablePayloads(obj, title);
        tables.push(...extracted);
      });

      return tables;
    }

    function renderTables(tables) {
      if (!Array.isArray(tables) || tables.length === 0) {
        return "<em>(không có dữ liệu bảng)</em>";
      }

      const blocks = tables.map((table) => {
        const rows = table.rows || [];
        const inferredHeaders = Array.from(
          rows.reduce((set, row) => {
            Object.keys(row || {}).forEach((key) => set.add(key));
            return set;
          }, new Set())
        );
        const headers = (Array.isArray(table.headers) && table.headers.length > 0)
          ? table.headers.filter((h) => inferredHeaders.includes(h)).concat(inferredHeaders.filter((h) => !table.headers.includes(h)))
          : inferredHeaders;

        const titleHtml = table.title ? `<h4>${escapeHtml(table.title)}</h4>` : "";
        const thead = `<thead><tr>${headers.map((h) => `<th>${escapeHtml(h)}</th>`).join("")}</tr></thead>`;
        const tbody = `<tbody>${rows.map((row) => `<tr>${headers.map((h) => `<td>${escapeHtml(row[h] == null ? "" : row[h])}</td>`).join("")}</tr>`).join("")}</tbody>`;
        return `${titleHtml}<table>${thead}${tbody}</table>`;
      });

      return blocks.join("<hr />");
    }

    function extractMarkdownFromArtifact(payload) {
      if (typeof payload === "string" && payload.trim()) {
        return payload;
      }

      if (!payload || typeof payload !== "object") {
        return "";
      }

      const directKeys = ["content", "ocr_text", "rendered_text", "raw_text", "markdown"];
      for (const key of directKeys) {
        if (typeof payload[key] === "string" && payload[key].trim()) {
          return payload[key];
        }
      }

      if (Array.isArray(payload)) {
        const chunks = [];
        for (const item of payload) {
          if (!item || typeof item !== "object") {
            continue;
          }
          const piece = extractMarkdownFromArtifact(item);
          if (piece) {
            const title = typeof item.filename === "string" && item.filename.trim()
              ? `### ${item.filename}\n\n`
              : "";
            chunks.push(title + piece);
          }
        }
        return chunks.join("\n\n").trim();
      }

      if (Array.isArray(payload.result)) {
        return extractMarkdownFromArtifact(payload.result);
      }

      if (Array.isArray(payload.tables) && payload.tables.length > 0) {
        return "";
      }

      return "";
    }

    async function fetchPreviewPayload(taskId) {
      const statusRes = await fetch(`/api/v1/task-status/${encodeURIComponent(taskId)}`);
      const statusData = await statusRes.json();
      let markdownFallback = "";

      if (statusData.status === "SUCCESS" && statusData.result) {
        const result = statusData.result;
        if (typeof result.content === "string" && result.content.trim()) {
          try {
            const parsedFromContent = JSON.parse(result.content);
            const tablesFromContent = extractTablePayloads(parsedFromContent, result.filename || "");
            if (tablesFromContent.length > 0) {
              return { kind: "table", data: tablesFromContent };
            }
          } catch (_) {
            const tablesFromMixedContent = extractTablesFromMixedText(result.content);
            if (tablesFromMixedContent.length > 0) {
              return { kind: "table", data: tablesFromMixedContent };
            }
          }
          markdownFallback = result.content;
        }
      }

      const jsonRes = await fetch(`/api/v1/task-artifact/${encodeURIComponent(taskId)}/json`, {
        method: "POST"
      });
      if (!jsonRes.ok) {
        if (markdownFallback) {
          return { kind: "markdown", data: markdownFallback };
        }
        throw new Error("Không có dữ liệu preview cho task này");
      }
      const text = await jsonRes.text();
      try {
        const parsed = JSON.parse(text);
        const tables = extractTablePayloads(parsed);
        if (tables.length > 0) {
          return { kind: "table", data: tables };
        }
        const markdown = extractMarkdownFromArtifact(parsed);
        if (markdown) {
          return { kind: "markdown", data: markdown };
        }
        if (markdownFallback) {
          return { kind: "markdown", data: markdownFallback };
        }
        return { kind: "json", data: parsed };
      } catch (_) {
        const tablesFromMixedJson = extractTablesFromMixedText(text);
        if (tablesFromMixedJson.length > 0) {
          return { kind: "table", data: tablesFromMixedJson };
        }
        if (markdownFallback) {
          return { kind: "markdown", data: markdownFallback };
        }
        return { kind: "markdown", data: text };
      }
    }

    async function downloadArtifact(taskId, kind, fallbackName) {
      const res = await fetch(`/api/v1/task-artifact/${encodeURIComponent(taskId)}/${kind}`, {
        method: "POST"
      });
      if (!res.ok) {
        let detail = "Download failed";
        try {
          const err = await res.json();
          detail = err.detail || detail;
        } catch (_) {
          // ignore parse error
        }
        throw new Error(detail);
      }

      const blob = await res.blob();
      const filename = getFilenameFromContentDisposition(
        res.headers.get("content-disposition"),
        fallbackName
      );
      const objectUrl = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = objectUrl;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(objectUrl);
    }

    async function fetchTasks() {
      try {
        const res = await fetch("/api/v1/tasks");
        const tasks = await res.json();

        historyBody.innerHTML = "";
        if (tasks.length === 0) {
          historyBody.innerHTML = `<tr><td colspan="8">Chưa có dữ liệu nào trong lịch sử.</td></tr>`;
          return;
        }

        tasks.forEach(task => {
          const tr = document.createElement("tr");

          let statusHtml = "";
          if (task.status === "success") {
            statusHtml = `<span class="status-badge status-success">Thành công</span>`;
          } else if (task.status === "failed") {
            statusHtml = `<span class="status-badge status-failed" title="${task.error || ''}">Thất bại</span>`;
          } else {
            statusHtml = `<span class="status-badge status-pending">Đang xử lý</span>`;
          }

          const fileBase = safeSlug(String(task.filename || "output").replace(/\.[^/.]+$/, ""));
          const folderName = task.folder_path ? String(task.folder_path).split(/[/\\]/).pop() : "";
          const slug = folderName ? `${safeSlug(folderName)}_${fileBase}` : fileBase;

          let downloadHtml = "-";
          if (task.status === "success") {
            downloadHtml = `
              <div style="display:flex; gap: 8px;">
                <button class="btn pv-btn" data-task-id="${task.id}">Preview</button>
                <button class="btn dl-btn" ${task.json_path ? `data-task-id="${task.id}" data-kind="json" data-fallback-name="${slug}.json"` : 'disabled'}>JSON</button>
                <button class="btn dl-btn" ${task.excel_path ? `data-task-id="${task.id}" data-kind="excel-lv1" data-fallback-name="excel_${slug}_lv1.xlsx"` : 'disabled'}>Excel Gốc</button>
                <button class="btn dl-btn" ${task.excel_path ? `data-task-id="${task.id}" data-kind="excel" data-fallback-name="excel_${slug}_template.xlsx"` : 'disabled'}>Excel Template</button>
              </div>
            `;
          } else if (task.status === "failed") {
            downloadHtml = `<span style="font-size: 12px; color: var(--danger);">${task.error || ''}</span>`;
          }

          tr.innerHTML = `
            <td><small>${task.id.split('-')[0]}...</small></td>
            <td><small style="color: var(--muted); word-break: break-all;" title="${task.folder_path || ""}">${folderName || "-"}</small></td>
            <td>${task.filename || "-"}</td>
            <td>${task.template || "default"}</td>
            <td>${statusHtml}</td>
            <td>${formatDate(task.created_at)}</td>
            <td>${formatDate(task.completed_at)}</td>
            <td>${downloadHtml}</td>
          `;
          historyBody.appendChild(tr);
        });
      } catch (err) {
        historyBody.innerHTML = `<tr><td colspan="8" style="color:red">Lỗi tải dữ liệu: ${err.message}</td></tr>`;
      }
    }

    historyBody.addEventListener("click", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) {
        return;
      }
      if (target.classList.contains("pv-btn")) {
        const taskId = target.getAttribute("data-task-id");
        if (!taskId) {
          return;
        }
        target.setAttribute("disabled", "true");
        try {
          const payload = await fetchPreviewPayload(taskId);
          const html = payload.kind === "json"
            ? renderAsJson(payload.data)
            : payload.kind === "table"
              ? renderTables(payload.data)
              : renderAsMarkdown(payload.data);
          openPreview(`Preview task ${taskId.split("-")[0]}...`, html);
        } catch (err) {
          alert("Lỗi preview: " + err.message);
        } finally {
          target.removeAttribute("disabled");
        }
        return;
      }

      if (!target.classList.contains("dl-btn")) {
        return;
      }
      const taskId = target.getAttribute("data-task-id");
      const kind = target.getAttribute("data-kind");
      const fallbackName = target.getAttribute("data-fallback-name") || "download.bin";
      if (!taskId || !kind) {
        return;
      }
      try {
        await downloadArtifact(taskId, kind, fallbackName);
      } catch (err) {
        alert("Lỗi tải file: " + err.message);
      }
    });

    closePreviewBtn.addEventListener("click", closePreview);
    previewBackdrop.addEventListener("click", (event) => {
      if (event.target === previewBackdrop) {
        closePreview();
      }
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && previewBackdrop.classList.contains("open")) {
        closePreview();
      }
    });

    fetchTasks();
    setInterval(fetchTasks, 5000); // Tự động reload mỗi 5s
  </script>
</body>
</html>
