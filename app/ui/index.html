<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extract PDF - Quick UI</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2a37;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-2: #0ea5a0;
      --border: #e5e7eb;
      --danger: #b91c1c;
      --ok: #166534;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #d1fae5 0, var(--bg) 45%);
      color: var(--text);
    }

    .wrap {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .header {
      margin-bottom: 16px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 22px rgba(15, 118, 110, 0.08);
      margin-bottom: 16px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .help-box {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fcfffe;
      min-height: 130px;
    }

    .help-box h4 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .help-box p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn.secondary {
      background: #243042;
    }

    .btn.ghost {
      background: #e2e8f0;
      color: #1f2a37;
    }

    .btn {
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      font-size: 14px;
      color: var(--muted);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.err {
      color: var(--danger);
    }

    pre {
      margin: 0;
      background: #0b1020;
      color: #d1d5db;
      padding: 12px;
      border-radius: 10px;
      overflow: auto;
      max-height: 340px;
      font-size: 12px;
      line-height: 1.45;
    }

    .content-box {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 12px;
      white-space: pre-wrap;
      min-height: 120px;
      background: #fcfcfd;
    }

    @media (max-width: 760px) {

      .layout,
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Extract PDF - Quick UI</h1>
      <p>Small test UI for team members to try extraction without using Swagger manually.</p>
    </div>

    <div class="layout">
      <div class="panel">
        <div class="grid">
          <div class="field">
            <label for="agent">Agent</label>
            <select id="agent" data-help-title="Agent"
              data-help-text="Chon provider/agent se xu ly anh. Co the dung gemini, openai, openai_compatible, local_http, hoac agent khai bao qua env."></select>
          </div>

          <div class="field">
            <label for="outputFormat">Output Format</label>
            <select id="outputFormat" data-help-title="Output Format"
              data-help-text="Chon markdown neu muon ket qua text, hoac json neu muon ket qua co cau truc de luu file va tai Excel.">
              <option value="markdown">markdown</option>
              <option value="json">json</option>
            </select>
          </div>

          <div class="field">
            <label for="model">Model (optional)</label>
            <input id="model" placeholder="e.g. gpt-4o, qwen2.5-vl" data-help-title="Model"
              data-help-text="Nhap ten model neu agent can override model mac dinh, vi du gpt-4o, qwen2.5-vl, hoac model OCR rieng." />
          </div>

          <div class="field">
            <label for="baseUrl">Base URL (optional)</label>
            <input id="baseUrl" placeholder="e.g. http://127.0.0.1:8080/ocr" data-help-title="Base URL"
              data-help-text="Nhap endpoint API cua agent/LightOnOCR neu dung local_http hoac openai_compatible." />
          </div>

          <div class="field full">
            <label for="apiKey">API Key (optional)</label>
            <input id="apiKey" placeholder="token" data-help-title="API Key"
              data-help-text="Nhap token neu endpoint can xac thuc. Neu endpoint public hoac local khong can key, co the de trong." />
          </div>

          <div class="field full">
            <label for="imageFile">Image File</label>
            <input id="imageFile" type="file" accept="image/*" data-help-title="Image File"
              data-help-text="Tai anh tu may local len. Neu co file, he thong se encode sang base64 va gui trong request." />
          </div>

          <div class="field full">
            <label for="imagePath">or Image Path (server local path, optional)</label>
            <input id="imagePath" placeholder="D:/path/to/image.png" data-help-title="Image Path"
              data-help-text="Dung duong dan file nam tren server. Chi phu hop khi API server truy cap duoc file local do." />
          </div>

          <div class="field full">
            <label for="saveToFile" data-help-title="Save output files"
              data-help-text="Bat len neu ban muon luu ket qua ra file va co the tai JSON/Excel tu UI sau khi task xong.">
              <input id="saveToFile" type="checkbox" checked style="width:auto; margin-right: 8px;" />
              Save output files (required for Download JSON/Excel)
            </label>
          </div>
        </div>

        <div class="row" style="margin-top: 12px;">
          <button id="submitBtn" class="btn" data-help-title="Submit Task"
            data-help-text="Gui payload toi endpoint /api/v1/extract/json de tao task OCR trong background worker.">Submit
            Task</button>
          <div id="statusText" class="status">Ready</div>
        </div>

        <div class="actions">
          <button id="downloadJsonBtn" class="btn secondary" disabled data-help-title="Download JSON"
            data-help-text="Tai file JSON ket qua cua task. Chi bat len khi task SUCCESS va save_to_file duoc bat.">Download
            JSON</button>
          <button id="downloadExcelBtn" class="btn secondary" disabled data-help-title="Download Excel"
            data-help-text="Tai file Excel duoc worker tao khi output_format=json va parse thanh cong du lieu co cau truc.">Download
            Excel</button>
          <button id="copyContentBtn" class="btn ghost" disabled data-help-title="Copy Content"
            data-help-text="Copy noi dung content hien tai vao clipboard de dan sang app khac nhanh hon.">Copy
            Content</button>
          <button id="clearBtn" class="btn ghost" data-help-title="Clear"
            data-help-text="Xoa task hien tai va reset trang thai man hinh ve Ready, khong xoa file da luu tren server.">Clear</button>
        </div>
      </div>

      <div class="panel">
        <h3 style="margin-top: 0;">Field & Button Help</h3>
        <div class="help-box">
          <h4 id="hoverHelpTitle">Hover a field or button</h4>
          <p id="hoverHelpText">Di chuot vao input, select, checkbox hoac nut o ben trai de xem giai thich ngan ve tung
            thanh phan.</p>
        </div>
      </div>
    </div>

    <div class="panel">
      <h3 style="margin-top: 0;">Extracted Content</h3>
      <div id="contentBox" class="content-box"></div>
    </div>

    <div class="panel">
      <h3 style="margin-top: 0;">Raw Result</h3>
      <pre id="rawResult">{}</pre>
    </div>
  </div>

  <script>
    const agentEl = document.getElementById("agent");
    const outputFormatEl = document.getElementById("outputFormat");
    const modelEl = document.getElementById("model");
    const baseUrlEl = document.getElementById("baseUrl");
    const apiKeyEl = document.getElementById("apiKey");
    const imageFileEl = document.getElementById("imageFile");
    const imagePathEl = document.getElementById("imagePath");
    const saveToFileEl = document.getElementById("saveToFile");
    const submitBtn = document.getElementById("submitBtn");
    const downloadJsonBtn = document.getElementById("downloadJsonBtn");
    const downloadExcelBtn = document.getElementById("downloadExcelBtn");
    const copyContentBtn = document.getElementById("copyContentBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusText = document.getElementById("statusText");
    const rawResultEl = document.getElementById("rawResult");
    const contentBoxEl = document.getElementById("contentBox");
    const hoverHelpTitleEl = document.getElementById("hoverHelpTitle");
    const hoverHelpTextEl = document.getElementById("hoverHelpText");

    let lastTaskId = null;
    let lastTaskResult = null;

    const defaultHelp = {
      title: "Hover a field or button",
      text: "Di chuot vao input, select, checkbox hoac nut o ben trai de xem giai thich ngan ve tung thanh phan."
    };

    function setHoverHelp(title, text) {
      hoverHelpTitleEl.textContent = title || defaultHelp.title;
      hoverHelpTextEl.textContent = text || defaultHelp.text;
    }

    function bindHoverHelp() {
      const hoverTargets = document.querySelectorAll("[data-help-title]");
      hoverTargets.forEach((el) => {
        const title = el.getAttribute("data-help-title") || el.textContent.trim();
        const text = el.getAttribute("data-help-text") || "No description";

        el.addEventListener("mouseenter", () => setHoverHelp(title, text));
        el.addEventListener("focus", () => setHoverHelp(title, text));
        el.addEventListener("mouseleave", () => setHoverHelp(defaultHelp.title, defaultHelp.text));
        el.addEventListener("blur", () => setHoverHelp(defaultHelp.title, defaultHelp.text));
      });
    }

    function setStatus(text, kind) {
      statusText.textContent = text;
      statusText.className = "status" + (kind ? " " + kind : "");
    }

    async function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || "");
          const base64 = result.includes(",") ? result.split(",")[1] : result;
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function loadAgents() {
      try {
        const res = await fetch("/api/v1/agents");
        const data = await res.json();
        agentEl.innerHTML = "";
        (data.agents || []).forEach((a) => {
          const opt = document.createElement("option");
          opt.value = a.name;
          opt.textContent = a.name + " (" + a.source + ")";
          if (a.name === data.default_agent) {
            opt.selected = true;
          }
          agentEl.appendChild(opt);
        });
      } catch (e) {
        setStatus("Cannot load agents: " + e.message, "err");
      }
    }

    async function pollTask(taskId) {
      lastTaskId = taskId;
      lastTaskResult = null;
      downloadJsonBtn.disabled = true;
      downloadExcelBtn.disabled = true;
      copyContentBtn.disabled = true;

      const maxAttempts = 120;
      const pendingWarningAfter = 12;
      let attempts = 0;

      while (attempts < maxAttempts) {
        attempts += 1;
        const res = await fetch("/api/v1/task-status/" + encodeURIComponent(taskId));
        const data = await res.json();
        rawResultEl.textContent = JSON.stringify(data, null, 2);

        if (data.status === "SUCCESS") {
          const result = data.result || {};
          lastTaskResult = result;
          const savedTo = typeof result.saved_to === "string" ? result.saved_to.toLowerCase() : "";
          const savedExcel = typeof result.saved_excel === "string" ? result.saved_excel.toLowerCase() : "";
          const hasJsonArtifact = savedTo.endsWith(".json");
          const hasExcelArtifact = savedExcel.endsWith(".xlsx");

          contentBoxEl.textContent = result.content || "(empty content)";
          downloadJsonBtn.disabled = !hasJsonArtifact;
          downloadExcelBtn.disabled = !hasExcelArtifact;
          copyContentBtn.disabled = !result.content;

          if (!hasJsonArtifact && !hasExcelArtifact) {
            setStatus("Completed. Download buttons require Save output files enabled.", "");
          } else {
            setStatus("Completed", "ok");
          }
          return;
        }

        if (data.status === "FAILURE") {
          setStatus("Task failed", "err");
          return;
        }

        if (data.status === "PENDING" && attempts >= pendingWarningAfter) {
          setStatus("Task is still PENDING. Worker/Redis may not be running. Start Redis and Celery worker, then submit again.", "err");
          return;
        }

        setStatus("Task status: " + data.status + " ...", "");
        await new Promise((r) => setTimeout(r, 2000));
      }

      setStatus("Polling timeout. Please check Worker/Redis status.", "err");
    }

    function triggerDownload(url) {
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "";
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
    }

    downloadJsonBtn.addEventListener("click", () => {
      if (!lastTaskId) {
        return;
      }
      triggerDownload("/api/v1/task-artifact/" + encodeURIComponent(lastTaskId) + "/json");
    });

    downloadExcelBtn.addEventListener("click", () => {
      if (!lastTaskId) {
        return;
      }
      triggerDownload("/api/v1/task-artifact/" + encodeURIComponent(lastTaskId) + "/excel");
    });

    copyContentBtn.addEventListener("click", async () => {
      const text = (lastTaskResult && lastTaskResult.content) || contentBoxEl.textContent || "";
      if (!text) {
        return;
      }
      await navigator.clipboard.writeText(text);
      setStatus("Content copied to clipboard", "ok");
    });

    clearBtn.addEventListener("click", () => {
      lastTaskId = null;
      lastTaskResult = null;
      contentBoxEl.textContent = "";
      rawResultEl.textContent = "{}";
      downloadJsonBtn.disabled = true;
      downloadExcelBtn.disabled = true;
      copyContentBtn.disabled = true;
      setStatus("Ready");
    });

    submitBtn.addEventListener("click", async () => {
      submitBtn.disabled = true;
      contentBoxEl.textContent = "";
      rawResultEl.textContent = "{}";

      try {
        const file = imageFileEl.files && imageFileEl.files[0];
        const imagePath = imagePathEl.value.trim();

        if (!file && !imagePath) {
          throw new Error("Please provide image file or image path.");
        }

        const payload = {
          image_path: imagePath || null,
          image_base64: null,
          filename: file ? file.name : null,
          agent: agentEl.value,
          output_format: outputFormatEl.value,
          save_to_file: Boolean(saveToFileEl.checked),
          options: {
            model: modelEl.value.trim() || null,
            base_url: baseUrlEl.value.trim() || null,
            api_key: apiKeyEl.value.trim() || null
          }
        };

        if (file) {
          setStatus("Encoding image...", "");
          payload.image_base64 = await toBase64(file);
        }

        setStatus("Submitting task...", "");
        const res = await fetch("/api/v1/extract/json", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        rawResultEl.textContent = JSON.stringify(data, null, 2);
        lastTaskResult = data;

        if (!res.ok) {
          throw new Error(data.detail || "Request failed");
        }

        const taskId = data.task_id;
        if (!taskId) {
          throw new Error("No task_id returned");
        }

        await pollTask(taskId);
      } catch (e) {
        setStatus("Error: " + e.message, "err");
      } finally {
        submitBtn.disabled = false;
      }
    });

    bindHoverHelp();
    loadAgents();
  </script>
</body>
</html>
