# docker-compose.cpu.yml — CPU mode (không cần GPU)
# Dùng khi không có GPU hoặc nvidia-container-toolkit.
#
# Khởi động:
#   docker compose -f docker-compose.cpu.yml --profile lightonocr up -d
#
# Tự động (đọc LIGHTONOCR_DEVICE từ .env):
#   PowerShell: .\start.ps1
#
# ⚠️ Yêu cầu RAM: Docker Desktop cần ≥ 12 GB (WSL2)
#    Xem: doc/docker-run.md

name: extract-pdf

services:

  # ── LightOnOCR — CPU mode ────────────────────────────────────────────────────
  lightonocr:
    build:
      context: ./LightOnOCR-2-1B
      dockerfile: docker/Dockerfile
    image: lightonocr:latest
    container_name: lightonocr
    ports:
      - "${LIGHTONOCR_PORT:-7861}:7861"
    volumes:
      - ./LightOnOCR-2-1B:/app/model:ro
      - ./LightOnOCR-2-1B/outputs:/app/outputs
    environment:
      MODEL_PATH: /app/model
      LIGHTONOCR_DEVICE: cpu        # ← Ép CPU, bỏ qua GPU
      LIGHTONOCR_DTYPE: float32     # ← float32 cho CPU
      API_HOST: 0.0.0.0
      API_PORT: "7861"
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTORCH_ENABLE_MPS_FALLBACK: "1"
    # Không có deploy.resources → Docker bỏ qua nvidia runtime
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7861/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s    # CPU load model chậm hơn GPU (~60s)
    restart: unless-stopped
    profiles:
      - lightonocr
    command: ["python", "api.py"]

  # ── Extract-PDF API ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: extract-pdf-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-lightonocr}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LOCAL_HTTP_TIMEOUT=${LOCAL_HTTP_TIMEOUT:-300}
      - LOCAL_HTTP_BASE_URL=${LOCAL_HTTP_BASE_URL:-http://lightonocr:7861/extract}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./uploaded_images:/app/uploaded_images
      - ./outputs:/app/outputs
      - ./ui-config.json:/app/ui-config.json
      - ./config:/app/config:ro
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
